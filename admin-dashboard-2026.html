<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sports Day Admin Dashboard</title>

<style>

body{

margin:0;
background:#edf2f7;
font-family:Arial;

}

header{

background:#0b3d91;
color:white;
padding:20px;

}

.top{

width:95%;
margin:auto;

}

.dashboard{

display:grid;

grid-template-columns:repeat(auto-fit,minmax(220px,1fr));

gap:20px;

padding:25px;

}

.card{
    padding:20px;
    border-radius:12px;
    color:white;
    box-shadow:0 5px 15px rgba(0,0,0,.2);
    text-align:center;
}

.card:nth-child(1){
    background:#1565c0;
}

.card:nth-child(2){
    background:#2e7d32;
}

.card:nth-child(3){
    background:#ef6c00;
}

.card:nth-child(4){
    background:#8e24aa;
}

.card h1,
.card h2,
.card h3{
    margin:8px 0;
    color:white;
}
.card h1{

color:white;

font-size:40px;

margin:10px;

}
.controls{

width:95%;

margin:auto;

display:flex;

gap:20px;

margin-bottom:20px;

}

.controls input,.controls select{

padding:12px;

font-size:16px;

border-radius:8px;

border:1px solid #ccc;

flex:1;

}
.tableContainer{

width:95%;

margin:auto;

overflow-x:auto;

}
table{

width:95%;

margin:auto;

border-collapse:collapse;

background:white;

box-shadow:0 4px 10px rgba(0,0,0,.15);

}

th{

background:#0b3d91;

color:white;

padding:14px;

}

td{

padding:12px;

text-align:center;

border-bottom:1px solid #ddd;
}
button{
    color:white;
    border:none;
    padding:10px 18px;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
    transition:0.3s;
}

button:hover{
    transform:scale(1.05);
}

.exportBtn{
    background:#2e7d32;
}

.printBtn{
    background:#1565c0;
}

.deleteBtn{
    background:#d32f2f;
}    
.classTabs{
    width:95%;
    margin:20px auto;
    display:flex;
    flex-wrap:wrap;
    gap:10px;
}

.tab{
    background:#e3eaf7;
    color:#0b3d91;
    border:none;
    padding:10px 18px;
    border-radius:20px;
    cursor:pointer;
    font-weight:bold;
}

.tab:hover{
    background:#0b3d91;
    color:white;
}

.tab.active{
    background:#0b3d91;
    color:white;
}
</style>

</head>
<body>

<header>

<div class="top">

<h1>🏆 Sports Day Admin Dashboard</h1>

<p>Vignan World One School</p>

</div>

</header>

<div class="dashboard">

<div class="card">
<h3>Total Registrations</h3>
<h1 id="total">0</h1>
</div>

<div class="card">
<h3>Current Registrations</h3>
<h1 id="today">0</h1>
</div>

<div class="card">
<h3>Total Events</h3>
<h1 id="events">0</h1>
</div>

<div class="card">
<h3>Last Registration</h3>
<h2 id="last">----</h2>
</div>

</div>

<div class="controls">
<button class="exportBtn" onclick="exportCSV()">
📄 Export CSV
</button>

<button class="printBtn" onclick="window.print()">
🖨 Print
</button>
<input
type="text"
id="search"
placeholder="🔍 Search Student..."
onkeyup="filterTable()">

<select id="eventFilter">

<option value="">All Events</option>

</select>

</div>
<div class="classTabs">

<button class="tab active" onclick="filterClass('')">All</button>

<button class="tab" onclick="filterClass('PP1')">PP1</button>

<button class="tab" onclick="filterClass('PP2')">PP2</button>

<button class="tab" onclick="filterClass('1')">1</button>

<button class="tab" onclick="filterClass('2')">2</button>

<button class="tab" onclick="filterClass('3')">3</button>

<button class="tab" onclick="filterClass('4')">4</button>

<button class="tab" onclick="filterClass('5')">5</button>

<button class="tab" onclick="filterClass('6')">6</button>

<button class="tab" onclick="filterClass('7')">7</button>

<button class="tab" onclick="filterClass('8')">8</button>

<button class="tab" onclick="filterClass('9')">9</button>

<button class="tab" onclick="filterClass('10')">10</button>

</div>
<div class="tableContainer">

<table id="studentTable">
<thead>

<tr>

<th>Name</th>
<th>Class</th>
<th>Event</th>
<th>Date</th>
<th>Delete</th>

</tr>

</thead>

<tbody>

</tbody>
</table>
</div>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<div style="width:95%;margin:40px auto;background:white;padding:20px;border-radius:12px;box-shadow:0 4px 10px rgba(0,0,0,.15);">
    <h2 style="text-align:center;color:#0b3d91;">📊 Event Wise Registrations</h2>

    <canvas id="eventChart"></canvas>
</div>
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";

import {
getFirestore,
collection,
onSnapshot,
deleteDoc,
doc
}

from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";

const firebaseConfig = {

apiKey: "AIzaSyC88yAXnb9CgQVWb3VANGmBAzqqw513ISE",

authDomain: "sports-day-5b77f.firebaseapp.com",

projectId: "sports-day-5b77f",

storageBucket: "sports-day-5b77f.firebasestorage.app",

messagingSenderId: "962574197835",

appId: "1:962574197835:web:02a852d9987d58be6199ce"

};
const app=initializeApp(firebaseConfig);

const db=getFirestore(app);

const tbody=document.querySelector("tbody");

const total=document.getElementById("total");
    const ctx = document.getElementById("eventChart");

let chart = new Chart(ctx,{
    type:"bar",
    data:{
        labels:[],
       datasets:[{
    label:"Registrations",
    data:[],
    backgroundColor:"#1565c0",
    borderRadius:8
}]
    },
    options:{
        responsive:true,
        plugins:{
            legend:{
                display:false
            }
        }
    }
});
const students = [];

snapshot.forEach((student)=>{
    students.push({
        id: student.id,
        ...student.data()
    });
});

students.sort((a, b) =>
    a.classSec.localeCompare(b.classSec, undefined, {
        numeric: true,
        sensitivity: "base"
    })
);

students.forEach((data)=>{

    if(eventCount[data.event]){
        eventCount[data.event]++;
    } else {
        eventCount[data.event]=1;
    }

    if (!data.timestamp && lastStudent === "----") {
        lastStudent = data.name;
    }

    if ((data.timestamp || 0) > latestTime) {
        latestTime = data.timestamp || 0;
        lastStudent = data.name;
    }

    if(!eventList.includes(data.event))
        eventList.push(data.event);

    tbody.innerHTML += `
    <tr>
        <td>${data.name}</td>
        <td>${data.classSec}</td>
        <td>${data.event}</td>
        <td>${data.date}</td>
        <td>
            <button class="deleteBtn" onclick="deleteStudent('${data.id}')">
                🗑 Delete
            </button>
        </td>
    </tr>
    `;
});


document.getElementById("events").innerHTML=eventList.length;

document.getElementById("last").innerHTML=lastStudent;

let dropdown=document.getElementById("eventFilter");

dropdown.innerHTML="<option value=''>All Events</option>";

eventList.sort();

eventList.forEach(event=>{

dropdown.innerHTML+=`<option>${event}</option>`;

});
chart.data.labels = Object.keys(eventCount);
chart.data.datasets[0].data = Object.values(eventCount);
chart.update();

});
   
window.deleteStudent=async(id)=>{

if(confirm("Delete this registration?")){

await deleteDoc(doc(db,"registrations",id));

}

}
let selectedClass = "";

window.filterClass = (className) => {

    selectedClass = className;

    document.querySelectorAll(".tab").forEach(tab=>{
        tab.classList.remove("active");
    });

    document.querySelectorAll(".tab").forEach(tab=>{
        if(tab.innerText === (className === "" ? "All" : className)){
            tab.classList.add("active");
        }
    });

    filterTable();

};
window.filterTable=()=>{

let search=document.getElementById("search").value.toLowerCase();

let event=document.getElementById("eventFilter").value.toLowerCase();

let rows=document.querySelectorAll("tbody tr");

rows.forEach(row=>{

let txt=row.innerText.toLowerCase();

let eventName=row.cells[2].innerText.toLowerCase();
    
let className = row.cells[1].innerText.toLowerCase();
let show=true;

if(search!="" && !txt.includes(search))
show=false;

if(event!="" && eventName!=event)
show=false;
    
if(selectedClass != "" && !className.startsWith(selectedClass.toLowerCase()))
    show = false;
row.style.display=show?"":"none";

});

}

document.getElementById("eventFilter").onchange=filterTable;
    window.exportCSV=()=>{

let rows=document.querySelectorAll("table tr");

let csv=[];

rows.forEach(row=>{

let cols=row.querySelectorAll("th,td");

let data=[];

cols.forEach(col=>{

data.push('"' + col.innerText + '"');

});

csv.push(data.join(","));

});

let blob=new Blob([csv.join("\n")],{type:"text/csv"});

let link=document.createElement("a");

link.href=URL.createObjectURL(blob);

link.download="Sports_Day_Registrations.csv";

link.click();

}
</script>

</body>
</html>
