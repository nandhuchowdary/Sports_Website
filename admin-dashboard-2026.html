<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sports Day Admin Dashboard</title>

<style>

body{
    margin:0;
    font-family:Arial,Helvetica,sans-serif;
    background:#eef2f7;
}

header{
    background:#0b3d91;
    color:white;
    padding:20px;
    text-align:center;
}

.container{
    width:95%;
    max-width:1300px;
    margin:30px auto;
}

.cards{
    display:flex;
    gap:20px;
    flex-wrap:wrap;
}

.card{
    flex:1;
    min-width:220px;
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 3px 10px rgba(0,0,0,.15);
}

.card h2{
    margin:0;
    color:#0b3d91;
}

.card p{
    font-size:30px;
    margin-top:15px;
    font-weight:bold;
}

.searchBox{
    margin:25px 0;
}

.searchBox input{
    width:100%;
    padding:12px;
    border-radius:6px;
    border:1px solid #ccc;
    font-size:16px;
}

table{
    width:100%;
    border-collapse:collapse;
    background:white;
}

th{
    background:#0b3d91;
    color:white;
    padding:12px;
}

td{
    padding:12px;
    border-bottom:1px solid #ddd;
    text-align:center;
}

button{
    padding:8px 14px;
    border:none;
    border-radius:5px;
    cursor:pointer;
    color:white;
    background:red;
}

button:hover{
    opacity:.85;
}

</style>

</head>
<body>

<header>
<h1>🏆 Sports Day Admin Dashboard</h1>
</header>

<div class="container">

<div class="cards">

<div class="card">
<h2>Total Registrations</h2>
<p id="total">0</p>
</div>

</div>

<div class="searchBox">
<input
type="text"
id="search"
placeholder="Search Student Name..."
onkeyup="filterTable()">
</div>

<table id="studentTable">

<thead>

<tr>

<th>Name</th>
<th>Class</th>
<th>Event</th>
<th>Date</th>
<th>Delete</th>

</tr>

</thead>

<tbody>

</tbody>

</table>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";

import {
getFirestore,
collection,
onSnapshot,
deleteDoc,
doc
}

from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";

const firebaseConfig = {

apiKey: "AIzaSyC88yAXnb9CgQVWb3VANGmBAzqqw513ISE",

authDomain: "sports-day-5b77f.firebaseapp.com",

projectId: "sports-day-5b77f",

storageBucket: "sports-day-5b77f.firebasestorage.app",

messagingSenderId: "962574197835",

appId: "1:962574197835:web:02a852d9987d58be6199ce"

};
const app=initializeApp(firebaseConfig);

const db=getFirestore(app);

const tbody=document.querySelector("tbody");

const total=document.getElementById("total");

onSnapshot(collection(db,"registrations"),(snapshot)=>{

tbody.innerHTML="";

total.innerHTML=snapshot.size;

snapshot.forEach((student)=>{

const data=student.data();

tbody.innerHTML+=`

<tr>

<td>${data.name}</td>

<td>${data.classSec}</td>

<td>${data.event}</td>

<td>${data.date}</td>

<td>

<button onclick="deleteStudent('${student.id}')">

Delete

</button>

</td>

</tr>

`;

});

});

window.deleteStudent=async(id)=>{

if(confirm("Delete this registration?")){

await deleteDoc(doc(db,"registrations",id));

}

}

window.filterTable=()=>{

let input=document.getElementById("search").value.toLowerCase();

let rows=document.querySelectorAll("tbody tr");

rows.forEach(row=>{

let text=row.innerText.toLowerCase();

row.style.display=text.includes(input)?"":"none";

});

}

</script>

</body>
</html>
